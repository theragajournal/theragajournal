<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Raga Journal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='2' fill='%23121212'/%3E%3Cpath d='M5 16 Q9 8, 13 16 T21 16 T27 16' stroke='%23A8762E' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/front-page.css" />
<style>
  .article-wrap { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; }
  .back-link { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink-faint); margin-bottom: 28px; display: inline-block; }
  .back-link:hover { color: var(--ink); }
  .article-wrap .kicker { margin-bottom: 12px; }
  .article-wrap h1 { font-size: clamp(30px, 5vw, 44px); font-weight: 600; line-height: 1.12; margin: 0 0 16px; letter-spacing: -0.01em; }
  .article-wrap .dek { font-size: 19px; color: var(--ink-soft); line-height: 1.5; margin: 0 0 18px; }
  .article-wrap .byline { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--ink-faint); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 12px 0; margin-bottom: 32px; }
  .article-body { font-size: 19px; line-height: 1.75; color: var(--ink-soft); }
  .article-body h2 { font-family: 'Source Serif 4', serif; font-size: 27px; font-weight: 600; color: var(--ink); margin: 36px 0 14px; }
  .article-body h3 { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 600; color: var(--ink); margin: 28px 0 12px; }
  .article-body p { margin: 0 0 20px; }
  .article-body blockquote { border-left: 3px solid var(--ink); padding-left: 20px; font-style: italic; color: var(--ink); margin: 28px 0; }
  .article-body img { width: 100%; margin: 28px 0; }
  .article-body a { color: var(--brass-deep); text-decoration: underline; }
  .article-body ul, .article-body ol { padding-left: 26px; margin: 0 0 20px; }
  .tag-row { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--rule); display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-row a { font-family: 'Inter', sans-serif; font-size: 12px; background: var(--paper-dim); padding: 5px 12px; border-radius: 999px; color: var(--ink-soft); }
</style>
</head>
<body>

<div class="masthead-bar">
  <span id="todayDate">&nbsp;</span>
  <div class="right-links">
    <a href="index.html" class="sans">Front Page</a>
    <a href="cms/login.html" class="cms-link sans">Write for the Journal →</a>
  </div>
</div>

<div class="masthead">
  <a href="index.html" style="text-decoration:none;color:inherit;">
    <h1 class="wordmark">
      <span class="the">The</span>
      Raga Journal
    </h1>
  </a>
</div>

<div class="rule-double">
  <div class="rule-thick"></div>
  <div class="rule-thin"></div>
</div>

<main class="article-wrap">
  <a href="index.html" class="back-link">← Back to front page</a>
  <div id="loadingState" class="loading-state">Loading article…</div>
  <article id="articleContent" style="display:none;"></article>
</main>

<footer class="site-footer">
  <div class="footer-bottom" style="border-top:none;">
    <span>© <span id="yearSpan"></span> The Raga Journal.</span>
    <span>Published with The Raga Journal CMS.</span>
  </div>
</footer>

<script src="assets/js/site-config.js"></script>
<script src="assets/js/markdown.js"></script>
<script src="assets/js/public-content.js"></script>
<script>
  document.getElementById('yearSpan').textContent = new Date().getFullYear();
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');

  if (!slug) {
    document.getElementById('loadingState').textContent = 'No article specified.';
  } else {
    PublicContent.getBySlug(slug)
      .then((article) => {
        if (!article) {
          document.getElementById('loadingState').textContent = 'That article could not be found.';
          return;
        }
        document.title = `${article.frontmatter.title} · The Raga Journal`;
        const content = document.getElementById('articleContent');
        content.innerHTML = `
          <span class="kicker">${escapeHtml((article.frontmatter.categories || [])[0] || 'Journal')}</span>
          <h1>${escapeHtml(article.frontmatter.title)}</h1>
          ${article.frontmatter.excerpt ? `<p class="dek">${escapeHtml(article.frontmatter.excerpt)}</p>` : ''}
          <p class="byline">By ${escapeHtml(article.frontmatter.authorId || 'The Editors')} · ${fmtDate(article.frontmatter.publishedAt)}</p>
          <div class="article-body">${article.body}</div>
          ${(article.frontmatter.tags || []).length ? `
            <div class="tag-row">
              ${article.frontmatter.tags.map(t => `<a href="index.html#archive">${escapeHtml(t)}</a>`).join('')}
            </div>
          ` : ''}
        `;
        document.getElementById('loadingState').style.display = 'none';
        content.style.display = 'block';
      })
      .catch((err) => {
        console.error(err);
        document.getElementById('loadingState').textContent = 'Could not load this article right now.';
      });
  }
</script>
</body>
</html>
