backend:
  name: github
  repo: theragajournal/theragajournal
  branch: main

local_backend: false

media_folder: "uploads"
public_folder: "/uploads"

site_url: "https://theragajournal.online"
display_url: "https://theragajournal.online"

logo_url: "/assets/images/logo.png"

publish_mode: editorial_workflow

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: true

media_library:
  name: default

collections:

##############################################################################
# HOMEPAGE
##############################################################################

- label: "Homepage"
  name: "homepage"

  files:

  - label: "Homepage Settings"

    name: "homepage"

    file: "content/homepage.yml"

    fields:

      - label: "Site"
        name: "site"
        widget: "object"

        fields:

          - {label: Title,name: title,widget: string}

          - {label: Tagline,name: tagline,widget: string}

          - {label: Logo,name: logo,widget: image}

      - label: "Hero"

        name: "hero"

        widget: "object"

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Heading,name: title,widget: string}

          - {label: Subtitle,name: subtitle,widget: text}

          - {label: Background Image,name: image,widget: image}

          - {label: Button Text,name: button_text,widget: string}

          - {label: Button Link,name: button_link,widget: string}

      - label: "Announcement"

        name: "announcement"

        widget: "object"

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: false}

          - {label: Text,name: text,widget: text,required: false}

          - {label: Link,name: link,widget: string,required: false}

      - label: "Featured"

        name: "featured"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Featured Article Slug,name: article,widget: string}

      - label: "Editor's Pick"

        name: "editors_pick"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Number of Articles,name: limit,widget: number,default: 4}

      - label: "Trending"

        name: "trending"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Number of Articles,name: limit,widget: number,default: 6}

      - label: "Latest"

        name: "latest"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Number of Articles,name: limit,widget: number,default: 12}

      - label: "Categories"

        name: "categories"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - label: Items
            name: items
            widget: list

      - label: "Gallery"

        name: gallery

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Images,name: limit,widget: number,default: 8}

      - label: "Videos"

        name: videos

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Videos,name: limit,widget: number,default: 4}

      - label: "Newsletter"

        name: newsletter

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Title,name: title,widget: string}

          - {label: Description,name: text,widget: text}