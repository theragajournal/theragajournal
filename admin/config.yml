backend:
  name: github
  repo: theragajournal/theragajournal
  branch: main

local_backend: false

media_folder: "uploads"
public_folder: "/uploads"

site_url: "https://theragajournal.online"
display_url: "https://theragajournal.online"

logo_url: "/assets/images/logo.png"

publish_mode: editorial_workflow

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: true

media_library:
  name: default

collections:

##############################################################################
# HOMEPAGE
##############################################################################

- label: "Homepage"
  name: "homepage"

  files:

  - label: "Homepage Settings"

    name: "homepage"

    file: "content/homepage.yml"

    fields:

      - label: "Site"
        name: "site"
        widget: "object"

        fields:

          - {label: Title,name: title,widget: string}

          - {label: Tagline,name: tagline,widget: string}

          - {label: Logo,name: logo,widget: image}

      - label: "Hero"

        name: "hero"

        widget: "object"

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Heading,name: title,widget: string}

          - {label: Subtitle,name: subtitle,widget: text}

          - {label: Background Image,name: image,widget: image}

          - {label: Button Text,name: button_text,widget: string}

          - {label: Button Link,name: button_link,widget: string}

      - label: "Announcement"

        name: "announcement"

        widget: "object"

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: false}

          - {label: Text,name: text,widget: text,required: false}

          - {label: Link,name: link,widget: string,required: false}

      - label: "Featured"

        name: "featured"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Featured Article Slug,name: article,widget: string}

      - label: "Editor's Pick"

        name: "editors_pick"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Number of Articles,name: limit,widget: number,default: 4}

      - label: "Trending"

        name: "trending"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Number of Articles,name: limit,widget: number,default: 6}

      - label: "Latest"

        name: "latest"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Number of Articles,name: limit,widget: number,default: 12}

      - label: "Categories"

        name: "categories"

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - label: Items
            name: items
            widget: list

      - label: "Gallery"

        name: gallery

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Images,name: limit,widget: number,default: 8}

      - label: "Videos"

        name: videos

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Videos,name: limit,widget: number,default: 4}

      - label: "Newsletter"

        name: newsletter

        widget: object

        fields:

          - {label: Enable,name: enabled,widget: boolean,default: true}

          - {label: Title,name: title,widget: string}

          - {label: Description,name: text,widget: text}
      - label: "Footer"

        name: footer

        widget: object

        fields:

          - {label: Copyright,name: copyright,widget: string}

          - {label: About Link,name: about,widget: string}

          - {label: Contact Link,name: contact,widget: string}

          - {label: Privacy Link,name: privacy,widget: string}

          - {label: Terms Link,name: terms,widget: string}

      - label: "Social"

        name: social

        widget: object

        fields:

          - {label: Facebook,name: facebook,widget: string,required: false}

          - {label: Instagram,name: instagram,widget: string,required: false}

          - {label: YouTube,name: youtube,widget: string,required: false}

          - {label: Threads,name: threads,widget: string,required: false}

          - {label: X,name: x,widget: string,required: false}

      - label: "Theme"

        name: theme

        widget: object

        fields:

          - {label: Accent Color,name: accent,widget: color}

          - {label: Background Color,name: background,widget: color}

          - {label: Text Color,name: text,widget: color}

##############################################################################
# ARTICLES
##############################################################################

- label: "Articles"

  name: "articles"

  folder: "content/articles"

  create: true

  delete: true

  extension: "md"

  format: "frontmatter"

  slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

  preview_path: "articles/{{slug}}"

  summary: "{{title}}"

  fields:

    - {label: Title,name: title,widget: string}

    - {label: Slug,name: slug,widget: string}

    - {label: Description,name: description,widget: text}

    - {label: Publish Date,name: date,widget: datetime}

    - {label: Cover Image,name: cover,widget: image}

    - {label: Banner Image,name: banner,widget: image,required: false}

    - {label: Author,name: author,widget: string}

    - label: Category
      name: category
      widget: select
      options:
        - Editorial
        - News
        - Tabla
        - Hindustani
        - Carnatic
        - Vocal
        - Instruments
        - Reviews
        - Interviews
        - History
        - Opinion

    - label: Tags
      name: tags
      widget: list

    - {label: Featured,name: featured,widget: boolean,default: false}

    - {label: Trending,name: trending,widget: boolean,default: false}

    - {label: Editor's Pick,name: editor,widget: boolean,default: false}

    - {label: Breaking News,name: breaking,widget: boolean,default: false}

    - {label: Show on Homepage,name: homepage,widget: boolean,default: true}

    - {label: Contains Video,name: video,widget: boolean,default: false}

    - {label: YouTube URL,name: youtube_url,widget: string,required: false}

    - {label: External Source,name: source,widget: string,required: false}

    - {label: Reading Time,name: reading_time,widget: number,required: false}

    - {label: Draft,name: draft,widget: boolean,default: false}

    - {label: Allow Comments,name: comments,widget: boolean,default: true}

    - label: SEO
      name: seo
      widget: object
      fields:

        - {label: SEO Title,name: title,widget: string,required: false}

        - {label: SEO Description,name: description,widget: text,required: false}

        - {label: Canonical URL,name: canonical,widget: string,required: false}

        - {label: No Index,name: noindex,widget: boolean,default: false}

        - {label: Open Graph Image,name: image,widget: image,required: false}

    - label: Body

      name: body

      widget: markdown
##############################################################################
# PAGES
##############################################################################

- label: "Pages"
  name: "pages"
  folder: "content/pages"
  create: true
  delete: true
  extension: "md"
  format: "frontmatter"
  slug: "{{slug}}"

  fields:

    - {label: Title, name: title, widget: string}

    - {label: Slug, name: slug, widget: string}

    - {label: Description, name: description, widget: text, required: false}

    - {label: Hero Image, name: hero, widget: image, required: false}

    - {label: Show In Navigation, name: navigation, widget: boolean, default: false}

    - {label: SEO Title, name: seo_title, widget: string, required: false}

    - {label: SEO Description, name: seo_description, widget: text, required: false}

    - {label: Body, name: body, widget: markdown}

##############################################################################
# AUTHORS
##############################################################################

- label: "Authors"
  name: "authors"
  folder: "content/authors"
  create: true
  delete: true
  extension: "yml"

  fields:

    - {label: Name, name: name, widget: string}

    - {label: Photo, name: photo, widget: image}

    - {label: Bio, name: bio, widget: text}

    - {label: Email, name: email, widget: string, required: false}

    - {label: Facebook, name: facebook, widget: string, required: false}

    - {label: Instagram, name: instagram, widget: string, required: false}

    - {label: X, name: x, widget: string, required: false}

    - {label: Website, name: website, widget: string, required: false}

##############################################################################
# CATEGORIES
##############################################################################

- label: "Categories"
  name: "categories"
  folder: "content/categories"
  create: true
  delete: true
  extension: "yml"

  fields:

    - {label: Category Name, name: title, widget: string}

    - {label: Slug, name: slug, widget: string}

    - {label: Icon, name: icon, widget: image, required: false}

    - {label: Description, name: description, widget: text, required: false}

##############################################################################
# PRIMARY MENU
##############################################################################

- label: "Navigation"
  name: "navigation"

  files:

    - label: "Main Menu"
      name: "mainmenu"
      file: "content/navigation.yml"

      fields:

        - label: Menu Items
          name: items
          widget: list

          fields:

            - {label: Label, name: label, widget: string}

            - {label: URL, name: url, widget: string}

            - {label: Open In New Tab, name: blank, widget: boolean, default: false}

##############################################################################
# FOOTER MENU
##############################################################################

- label: "Footer Menu"
  name: "footermenu"

  files:

    - label: "Footer"
      name: "footerlinks"
      file: "content/footer.yml"

      fields:

        - label: Links
          name: items
          widget: list

          fields:

            - {label: Label, name: label, widget: string}

            - {label: URL, name: url, widget: string}
##############################################################################
# SITE SETTINGS
##############################################################################

- label: "Site Settings"
  name: "settings"

  files:

    - label: "General Settings"
      name: "general"
      file: "content/settings.yml"

      fields:

        - {label: Site Name, name: site_name, widget: string}

        - {label: Site Description, name: description, widget: text}

        - {label: Site URL, name: url, widget: string}

        - {label: Logo, name: logo, widget: image}

        - {label: Favicon, name: favicon, widget: image}

        - {label: Default Author, name: author, widget: string}

        - {label: Default Language, name: language, widget: string, default: en}

        - {label: Time Zone, name: timezone, widget: string}

        - {label: Contact Email, name: email, widget: string}

        - {label: Phone, name: phone, widget: string, required: false}

        - {label: Address, name: address, widget: text, required: false}

##############################################################################
# SEO
##############################################################################

    - label: "SEO"
      name: "seo"
      file: "content/seo.yml"

      fields:

        - {label: Meta Title, name: title, widget: string}

        - {label: Meta Description, name: description, widget: text}

        - {label: Default Social Image, name: image, widget: image}

        - {label: Google Analytics ID, name: ga, widget: string, required: false}

        - {label: Google Search Console Verification, name: gsc, widget: string, required: false}

        - {label: Bing Verification, name: bing, widget: string, required: false}

        - {label: Robots.txt, name: robots, widget: text}

##############################################################################
# SOCIAL
##############################################################################

    - label: "Social Profiles"
      name: "social"
      file: "content/social.yml"

      fields:

        - {label: Facebook, name: facebook, widget: string, required: false}

        - {label: Instagram, name: instagram, widget: string, required: false}

        - {label: YouTube, name: youtube, widget: string, required: false}

        - {label: Threads, name: threads, widget: string, required: false}

        - {label: X, name: x, widget: string, required: false}

        - {label: LinkedIn, name: linkedin, widget: string, required: false}

        - {label: GitHub, name: github, widget: string, required: false}

##############################################################################
# ANNOUNCEMENT BAR
##############################################################################

    - label: "Announcement"
      name: "announcement"
      file: "content/announcement.yml"

      fields:

        - {label: Enabled, name: enabled, widget: boolean, default: false}

        - {label: Message, name: message, widget: text}

        - {label: Link, name: link, widget: string, required: false}

##############################################################################
# CUSTOM CODE
##############################################################################

    - label: "Custom Code"
      name: "customcode"
      file: "content/custom.yml"

      fields:

        - {label: Header Code, name: head, widget: text, required: false}

        - {label: Footer Code, name: footer, widget: text, required: false}

##############################################################################
# MAINTENANCE
##############################################################################

    - label: "Maintenance Mode"
      name: "maintenance"
      file: "content/maintenance.yml"

      fields:

        - {label: Enable Maintenance Mode, name: enabled, widget: boolean, default: false}

        - {label: Maintenance Message, name: message, widget: text}

##############################################################################
# REDIRECTS
##############################################################################

- label: "Redirects"

  name: "redirects"

  folder: "content/redirects"

  create: true

  delete: true

  extension: "yml"

  fields:

    - {label: From URL, name: from, widget: string}

    - {label: To URL, name: to, widget: string}

    - {label: Permanent (301), name: permanent, widget: boolean, default: true}