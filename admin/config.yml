backend:
  name: github
  repo: theragajournal/theragajournal
  branch: main
  base_url: https://theragajournal.pages.dev
  auth_endpoint: api/auth

site_url: https://theragajournal.online
display_url: https://theragajournal.online

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    extension: "md"

    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
    - name: "homepage"
    label: "Homepage"
    files:
      - file: "content/home.yml"
        label: "Homepage"
        name: "homepage"
        fields:
          - {label: "Site Title", name: "site_title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "text"}

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "markdown"}
              - {label: "Button Text", name: "button_text", widget: "string"}
              - {label: "Button Link", name: "button_link", widget: "string"}

          - {label: "Footer", name: "footer", widget: "string"}