<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Activity Log · The Raga Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/css/tokens.css" />
<link rel="stylesheet" href="../assets/css/shell.css" />
<style>
  .filter-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .timeline { position: relative; }
  .day-group { margin-bottom: 28px; }
  .day-label {
    font-family: 'Inter', sans-serif; font-size: 11.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink-faint); margin-bottom: 10px; position: sticky; top: 0;
    background: var(--paper); padding: 4px 0; z-index: 2;
  }
  .activity-item {
    display: flex; gap: 12px; padding: 12px 4px; border-left: 2px solid var(--hairline); margin-left: 8px; padding-left: 18px;
    position: relative;
  }
  .activity-item::before {
    content: ''; position: absolute; left: -5px; top: 18px; width: 8px; height: 8px; border-radius: 50%;
    background: var(--brass-500); border: 2px solid var(--paper);
  }
  .activity-icon {
    width: 30px; height: 30px; border-radius: 50%; background: var(--paper-dim); display: flex;
    align-items: center; justify-content: center; flex-shrink: 0; color: var(--ink-faint);
  }
  .activity-body { flex: 1; min-width: 0; }
  .activity-msg { font-size: 13.5px; color: var(--ink); }
  .activity-meta { font-size: 11.5px; color: var(--ink-faint); margin-top: 2px; }
  .activity-meta a { color: var(--brass-600); }
  .load-more-btn { display: block; margin: 24px auto 0; }
</style>
</head>
<body>
<div id="app-shell"></div>

<script src="../assets/js/github.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/markdown.js"></script>
<script src="../assets/js/util.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
  const session = Shell.mount('activity');
  if (session) {
    const { account, target } = session;
    const root = Shell.pageRoot();

    root.innerHTML = `
      <div class="page rise-in">
        <h1 class="font-display" style="font-size:26px;margin-bottom:4px;">Activity Log</h1>
        <p class="faint" style="font-size:13.5px;margin:0 0 20px;">
          A real record of every change to this repository — pulled directly from git commit history, not a separate log.
        </p>
        <div class="filter-row">
          <button class="pill active" data-filter="all" style="padding:6px 13px;border-radius:999px;font-size:12px;font-weight:500;background:var(--ink);color:var(--paper);border:none;cursor:pointer;">All activity</button>
          <button class="pill" data-filter="articles" style="padding:6px 13px;border-radius:999px;font-size:12px;font-weight:500;background:var(--paper-dim);color:var(--ink-soft);border:none;cursor:pointer;">Articles</button>
          <button class="pill" data-filter="media" style="padding:6px 13px;border-radius:999px;font-size:12px;font-weight:500;background:var(--paper-dim);color:var(--ink-soft);border:none;cursor:pointer;">Media</button>
          <button class="pill" data-filter="config" style="padding:6px 13px;border-radius:999px;font-size:12px;font-weight:500;background:var(--paper-dim);color:var(--ink-soft);border:none;cursor:pointer;">Settings</button>
        </div>
        <div id="timeline" class="timeline">
          <div class="center-loading"><span class="spinner"></span> Loading activity...</div>
        </div>
        <button id="loadMoreBtn" class="btn btn-ghost load-more-btn" style="display:none;">Load more</button>
      </div>
    `;

    let allCommits = [];
    let currentFilter = 'all';
    let visibleCount = 25;

    function iconFor(message) {
      const m = message.toLowerCase();
      if (m.includes('delete')) return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>';
      if (m.includes('upload') || m.includes('media')) return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
      if (m.includes('create') || m.includes('add')) return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>';
      if (m.includes('update') || m.includes('settings')) return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
      return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v6M12 15v6"/></svg>';
    }

    function categoryOf(message) {
      const m = message.toLowerCase();
      if (m.includes('media')) return 'media';
      if (m.includes('settings') || m.includes('taxonomy') || m.includes('category') || m.includes('tag')) return 'config';
      if (m.includes('article')) return 'articles';
      return 'other';
    }

    function render() {
      const timeline = document.getElementById('timeline');
      const filtered = currentFilter === 'all' ? allCommits : allCommits.filter(c => categoryOf(c.message) === currentFilter);
      const visible = filtered.slice(0, visibleCount);

      if (visible.length === 0) {
        timeline.innerHTML = `<div class="empty-row">No activity matches this filter yet.</div>`;
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
      }

      const groups = {};
      visible.forEach((c) => {
        const day = c.date ? new Date(c.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : 'Unknown date';
        if (!groups[day]) groups[day] = [];
        groups[day].push(c);
      });

      timeline.innerHTML = Object.entries(groups).map(([day, commits]) => `
        <div class="day-group">
          <div class="day-label">${escapeHtml(day)}</div>
          ${commits.map(c => `
            <div class="activity-item">
              <div class="activity-icon">${iconFor(c.message)}</div>
              <div class="activity-body">
                <div class="activity-msg">${escapeHtml(c.message.split('\n')[0])}</div>
                <div class="activity-meta">
                  ${escapeHtml(c.authorName)} · ${timeAgo(c.date)} ·
                  <a href="${c.url}" target="_blank" rel="noreferrer" class="mono">${c.sha.slice(0,7)}</a>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');

      document.getElementById('loadMoreBtn').style.display = filtered.length > visibleCount ? 'block' : 'none';
    }

    document.querySelectorAll('.pill').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        visibleCount = 25;
        document.querySelectorAll('.pill').forEach((p) => {
          p.style.background = p === btn ? 'var(--ink)' : 'var(--paper-dim)';
          p.style.color = p === btn ? 'var(--paper)' : 'var(--ink-soft)';
        });
        render();
      });
    });

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      visibleCount += 25;
      render();
    });

    (async () => {
      try {
        allCommits = await window.GitHubAPI.getCommits(account.token, target.owner, target.repo, target.branch, null, 100);
        render();
      } catch (err) {
        document.getElementById('timeline').innerHTML = `<div class="empty-row">${escapeHtml(err.message || 'Could not load activity.')}</div>`;
      }
    })();
  }
</script>
</body>
</html>
