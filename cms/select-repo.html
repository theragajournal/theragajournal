<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose a repository · The Raga Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/css/tokens.css" />
<style>
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--hairline); }
  .who { display: flex; align-items: center; gap: 10px; }
  .who img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--hairline); }
  .who .name { font-size: 13.5px; font-weight: 500; }
  .who .login { font-size: 11.5px; color: var(--ink-faint); }
  .wrap { max-width: 640px; margin: 0 auto; padding: 48px 24px; }
  .repo-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; text-align: left; padding: 14px 16px; border-radius: 8px;
    border: 1px solid var(--hairline); background: none; cursor: pointer;
    margin-bottom: 8px; transition: border-color 0.15s, background-color 0.15s;
  }
  .repo-row:hover { border-color: var(--brass-300); background: rgba(168,118,46,0.03); }
  .repo-row .full-name { font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .repo-row .meta { font-size: 11.5px; color: var(--ink-faint); margin-top: 2px; }
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input { padding-left: 38px; }
  .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--ink-faint); }
  .repo-list { max-height: 55vh; overflow-y: auto; }
  .selected-card { border: 1px solid var(--hairline); border-radius: var(--radius); padding: 18px; margin-bottom: 24px; }
  .branch-row { position: relative; margin-bottom: 24px; }
  .branch-row svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--ink-faint); }
  .branch-row select { padding-left: 38px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="who">
    <img id="avatarImg" src="" alt="" />
    <div>
      <div class="name" id="nameText"></div>
      <div class="login" id="loginText"></div>
    </div>
  </div>
  <button id="signOutBtn" class="btn btn-ghost btn-sm">Sign out</button>
</div>

<div class="wrap">
  <h1 class="font-display" style="font-size:24px;margin-bottom:4px;">Choose a repository</h1>
  <p class="faint" style="font-size:14px;margin:0 0 28px;">The Raga Journal will read and write content directly to this repo.</p>

  <div id="repoStep">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" class="input" placeholder="Search repositories..." />
    </div>
    <div id="loadingRow" class="center-loading"><span class="spinner"></span> Loading repositories...</div>
    <div id="errorBox" class="alert alert-error" style="display:none;"></div>
    <div id="repoList" class="repo-list"></div>
    <p id="emptyMsg" class="faint" style="text-align:center; display:none; font-size:14px; padding: 32px 0;">No repositories match.</p>
  </div>

  <div id="branchStep" style="display:none;" class="rise-in">
    <div class="selected-card">
      <div style="font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:6px;" id="selectedRepoName"></div>
      <button id="changeRepoBtn" class="btn-ghost" style="background:none;border:none;color:var(--brass-600);font-size:12px;font-weight:500;padding:0;margin-top:4px;cursor:pointer;">Choose a different repository</button>
    </div>

    <label class="field-label">Branch</label>
    <div class="branch-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M6 9v6M18 9a9 9 0 0 1-9 9"/></svg>
      <select id="branchSelect" class="input"></select>
    </div>

    <button id="openBtn" class="btn btn-primary btn-block">Open The Raga Journal</button>
  </div>
</div>

<script src="../assets/js/github.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  const account = Auth.getActiveAccount();
  if (!account) location.href = 'login.html';

  document.getElementById('avatarImg').src = account.avatarUrl;
  document.getElementById('nameText').textContent = account.name || account.login;
  document.getElementById('loginText').textContent = '@' + account.login;

  document.getElementById('signOutBtn').addEventListener('click', () => {
    Auth.logout();
    location.href = 'login.html';
  });

  let allRepos = [];
  let selectedRepo = null;

  function renderRepoList(repos) {
    const list = document.getElementById('repoList');
    list.innerHTML = '';
    document.getElementById('emptyMsg').style.display = repos.length === 0 ? 'block' : 'none';
    repos.forEach((repo) => {
      const row = document.createElement('button');
      row.className = 'repo-row';
      row.innerHTML = `
        <div>
          <div class="full-name">${repo.fullName}${repo.private ? ' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' : ''}</div>
          <div class="meta">Default branch: ${repo.defaultBranch}</div>
        </div>
      `;
      row.addEventListener('click', () => pickRepo(repo));
      list.appendChild(row);
    });
  }

  async function pickRepo(repo) {
    selectedRepo = repo;
    document.getElementById('repoStep').style.display = 'none';
    document.getElementById('branchStep').style.display = 'block';
    document.getElementById('selectedRepoName').textContent = repo.fullName;
    const select = document.getElementById('branchSelect');
    select.innerHTML = `<option>${repo.defaultBranch}</option>`;
    try {
      const branches = await window.GitHubAPI.listBranches(account.token, repo.owner, repo.name);
      select.innerHTML = '';
      (branches.length ? branches : [repo.defaultBranch]).forEach((b) => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        if (b === repo.defaultBranch) opt.selected = true;
        select.appendChild(opt);
      });
    } catch {
      /* keep default branch option */
    }
  }

  document.getElementById('changeRepoBtn').addEventListener('click', () => {
    document.getElementById('branchStep').style.display = 'none';
    document.getElementById('repoStep').style.display = 'block';
  });

  document.getElementById('openBtn').addEventListener('click', () => {
    const branch = document.getElementById('branchSelect').value;
    Auth.setTarget({ owner: selectedRepo.owner, repo: selectedRepo.name, branch });
    location.href = 'dashboard.html';
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderRepoList(allRepos.filter((r) => r.fullName.toLowerCase().includes(q)));
  });

  (async () => {
    try {
      allRepos = await window.GitHubAPI.listRepos(account.token);
      renderRepoList(allRepos);
    } catch (err) {
      document.getElementById('errorBox').textContent = err.message || 'Could not load repositories.';
      document.getElementById('errorBox').style.display = 'block';
    } finally {
      document.getElementById('loadingRow').style.display = 'none';
    }
  })();
</script>
</body>
</html>
