<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customize Site · The Raga Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/css/tokens.css" />
<link rel="stylesheet" href="../assets/css/shell.css" />
<style>
  .customizer-grid { display: grid; grid-template-columns: 320px 1fr; gap: 0; height: 100%; }
  @media (max-width: 960px) { .customizer-grid { grid-template-columns: 1fr; } }
  .customizer-panel { padding: 24px; border-right: 1px solid var(--hairline); overflow-y: auto; }
  @media (max-width: 960px) { .customizer-panel { border-right: none; border-bottom: 1px solid var(--hairline); } }
  .customizer-preview { padding: 24px; overflow-y: auto; background: var(--paper-dim); }
  .section-toggle-row {
    display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid var(--hairline);
  }
  .section-toggle-row:first-child { border-top: none; }
  .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track {
    position: absolute; inset: 0; background: var(--hairline); border-radius: 999px; cursor: pointer; transition: background-color 0.15s;
  }
  .switch-track::before {
    content: ''; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #fff; border-radius: 50%;
    transition: transform 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .switch input:checked + .switch-track { background: var(--brass-500); }
  .switch input:checked + .switch-track::before { transform: translateX(16px); }
  .preview-card { background: #fff; border: 1px solid var(--hairline); border-radius: 8px; padding: 28px; max-width: 480px; margin: 0 auto; }
  .swatch-row { display: flex; gap: 8px; }
  .swatch {
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
  }
  .swatch.selected { border-color: var(--ink); }
  .font-option {
    display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--hairline); border-radius: 8px;
    cursor: pointer; margin-bottom: 8px;
  }
  .font-option.selected { border-color: var(--brass-400); background: var(--brass-50); }
</style>
</head>
<body>
<div id="app-shell"></div>

<script src="../assets/js/github.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/markdown.js"></script>
<script src="../assets/js/util.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
  const session = Shell.mount('customizer');
  if (session) {
    const { account, target } = session;
    const root = Shell.pageRoot();
    root.style.padding = '0';
    const CONFIG_PATH = 'config/site.json';

    const ACCENT_OPTIONS = ['#A8762E', '#A8432E', '#5C7A5C', '#2E5DA8', '#7A2EA8'];
    const FONT_OPTIONS = [
      { id: 'fraunces', label: 'Fraunces (Editorial serif)', family: "'Source Serif 4', serif" },
      { id: 'playfair', label: 'Playfair Display (Classic)', family: "Georgia, serif" },
      { id: 'inter', label: 'Inter (Modern sans)', family: "'Inter', sans-serif" },
    ];

    const DEFAULT_CONFIG = {
      siteTitle: 'The Raga Journal',
      tagline: 'Notes on Indian classical music',
      theme: { mode: 'light', accentColor: '#A8762E', fontDisplay: 'fraunces' },
      homepage: {
        showHero: true,
        showSidebarRail: true,
        showQuoteBox: true,
        showPhotoCards: true,
        showNewsletter: true,
        showCategoryRails: true,
      },
    };

    root.innerHTML = `
      <div class="customizer-grid">
        <div class="customizer-panel">
          <h1 class="font-display" style="font-size:20px;margin-bottom:4px;">Customize Site</h1>
          <p class="faint" style="font-size:12.5px;margin:0 0 20px;">Changes apply to the public front page.</p>

          <div class="field" style="margin-bottom:18px;">
            <label class="field-label">Accent color</label>
            <div class="swatch-row" id="swatchRow"></div>
          </div>

          <div class="field" style="margin-bottom:18px;">
            <label class="field-label">Headline font</label>
            <div id="fontOptions"></div>
          </div>

          <div class="field" style="margin-bottom:8px;">
            <label class="field-label">Homepage sections</label>
            <div id="sectionToggles"></div>
          </div>

          <button id="saveCustomizerBtn" class="btn btn-primary btn-block" style="margin-top:24px;">Save &amp; publish</button>
          <p id="saveStatus" style="font-size:12px;color:var(--ink-faint);margin-top:8px;"></p>
        </div>

        <div class="customizer-preview">
          <p class="eyebrow" style="margin-bottom:12px;">Live preview</p>
          <div class="preview-card">
            <p id="previewKicker" style="font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 8px;">ESSAYS</p>
            <h2 id="previewHeadline" style="font-size:28px;margin:0 0 10px;line-height:1.15;">Why the Evening Raga Still Demands a Live Room</h2>
            <p style="font-size:14px;color:var(--ink-soft);line-height:1.5;margin:0 0 14px;">Recordings have never captured what happens when a raga unfolds in real time.</p>
            <button id="previewBtn" style="font-family:'Inter',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border:none;border-radius:3px;cursor:default;">Subscribe</button>
          </div>
        </div>
      </div>
    `;

    let config = DEFAULT_CONFIG;
    let sha;

    function renderSwatches() {
      document.getElementById('swatchRow').innerHTML = ACCENT_OPTIONS.map(c => `
        <button class="swatch ${config.theme.accentColor === c ? 'selected' : ''}" style="background:${c};" data-color="${c}"></button>
      `).join('');
      document.querySelectorAll('.swatch').forEach(sw => {
        sw.addEventListener('click', () => {
          config.theme.accentColor = sw.dataset.color;
          renderSwatches();
          updatePreview();
        });
      });
    }

    function renderFontOptions() {
      document.getElementById('fontOptions').innerHTML = FONT_OPTIONS.map(f => `
        <div class="font-option ${config.theme.fontDisplay === f.id ? 'selected' : ''}" data-font="${f.id}" style="font-family:${f.family};">
          ${escapeHtml(f.label)}
        </div>
      `).join('');
      document.querySelectorAll('.font-option').forEach(opt => {
        opt.addEventListener('click', () => {
          config.theme.fontDisplay = opt.dataset.font;
          renderFontOptions();
          updatePreview();
        });
      });
    }

    const SECTION_LABELS = {
      showHero: 'Lead story hero',
      showSidebarRail: '"Inside This Issue" sidebar',
      showQuoteBox: 'Quote of the day',
      showPhotoCards: 'Photo card grid',
      showNewsletter: 'Newsletter signup strip',
      showCategoryRails: 'Category browse rails',
    };

    function renderSectionToggles() {
      document.getElementById('sectionToggles').innerHTML = Object.entries(SECTION_LABELS).map(([key, label]) => `
        <div class="section-toggle-row">
          <span style="font-size:13px;">${escapeHtml(label)}</span>
          <label class="switch">
            <input type="checkbox" data-section="${key}" ${config.homepage[key] ? 'checked' : ''} />
            <span class="switch-track"></span>
          </label>
        </div>
      `).join('');
      document.querySelectorAll('[data-section]').forEach(input => {
        input.addEventListener('change', (e) => {
          config.homepage[e.target.dataset.section] = e.target.checked;
        });
      });
    }

    function updatePreview() {
      document.getElementById('previewKicker').style.color = config.theme.accentColor;
      document.getElementById('previewHeadline').style.fontFamily = FONT_OPTIONS.find(f => f.id === config.theme.fontDisplay)?.family || 'serif';
      document.getElementById('previewBtn').style.background = config.theme.accentColor;
    }

    document.getElementById('saveCustomizerBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveCustomizerBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving...';
      try {
        const result = await window.GitHubAPI.putFile(
          account.token, target.owner, target.repo, target.branch,
          CONFIG_PATH, JSON.stringify(config, null, 2), 'Update site customization', sha
        );
        sha = result.content.sha;
        document.getElementById('saveStatus').textContent = 'Saved — your public site will reflect this on next load.';
        toast('Customization saved to GitHub');
      } catch (err) {
        toast(err.message || 'Could not save.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save & publish';
      }
    });

    (async () => {
      try {
        const file = await window.GitHubAPI.getFile(account.token, target.owner, target.repo, target.branch, CONFIG_PATH);
        if (file) {
          const loaded = JSON.parse(file.content);
          config = {
            ...DEFAULT_CONFIG,
            ...loaded,
            theme: { ...DEFAULT_CONFIG.theme, ...(loaded.theme || {}) },
            homepage: { ...DEFAULT_CONFIG.homepage, ...(loaded.homepage || {}) },
          };
          sha = file.sha;
        }
      } catch { /* use defaults */ }
      renderSwatches();
      renderFontOptions();
      renderSectionToggles();
      updatePreview();
    })();
  }
</script>
</body>
</html>
