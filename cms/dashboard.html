<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · The Raga Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/css/tokens.css" />
<link rel="stylesheet" href="../assets/css/shell.css" />
<style>
  .stat-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px;
    background: var(--hairline); border: 1px solid var(--hairline);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 40px;
  }
  .stat-cell { background: #fff; padding: 18px 20px; }
  .stat-cell .num { font-size: 30px; }
  .stat-cell .label { font-size: 12px; color: var(--ink-faint); margin-top: 4px; }
  @media (max-width: 860px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } }
  .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 860px) { .cols-2 { grid-template-columns: 1fr; } }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-head h2 { font-size: 17px; }
  .list-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 16px; text-decoration: none; color: inherit; }
  .list-row:hover { background: rgba(28,27,25,0.02); }
  .list-row .title-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .list-row .title-row svg { flex-shrink: 0; width: 15px; height: 15px; color: var(--ink-faint); }
  .list-row .ttl { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-row .sub { font-size: 11.5px; color: var(--ink-faint); margin-top: 1px; }
  .empty-row { padding: 32px 16px; text-align: center; font-size: 13.5px; color: var(--ink-faint); }
  .repo-status-card { display: flex; align-items: center; gap: 14px; border: 1px solid var(--hairline); border-radius: var(--radius); padding: 16px; margin-bottom: 18px; }
  .repo-status-card .icon-circle { width: 38px; height: 38px; border-radius: 50%; background: var(--brass-50); display: flex; align-items: center; justify-content: center; color: var(--brass-600); flex-shrink: 0; }
</style>
</head>
<body>
<div id="app-shell"></div>

<script src="../assets/js/github.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/markdown.js"></script>
<script src="../assets/js/util.js"></script>
<script src="../assets/js/shell.js"></script>
<script src="../assets/js/articles.js"></script>
<script>
  const session = Shell.mount('dashboard');
  if (session) {
    const { account, target } = session;
    const root = Shell.pageRoot();
    root.innerHTML = `
      <div class="page rise-in">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px;">
          <h1 class="font-display" style="font-size:28px;">Dashboard</h1>
          <a id="repoLink" href="#" target="_blank" style="font-size:13px;color:var(--ink-faint);text-decoration:none;display:none;">
            <span id="repoLinkText"></span> ↗
          </a>
        </div>
        <p class="faint" style="font-size:13.5px;margin:0 0 28px;">${target.branch} branch · everything here reflects the live repository</p>

        <div class="stat-grid" id="statGrid">
          ${['Total articles','Published','Drafts','Scheduled','Categories','Tags'].map(l => `
            <div class="stat-cell"><div class="num font-display" data-stat>—</div><div class="label">${l}</div></div>
          `).join('')}
        </div>

        <div class="cols-2">
          <section>
            <div class="section-head">
              <h2 class="font-display">Recently edited</h2>
              <a href="articles.html" style="font-size:12px;color:var(--brass-600);font-weight:500;text-decoration:none;">View all</a>
            </div>
            <div class="panel divide" id="recentList">
              <div class="center-loading"><span class="spinner"></span> Loading...</div>
            </div>
          </section>

          <section>
            <h2 class="font-display" style="margin-bottom:12px;">Repository status</h2>
            <div class="repo-status-card">
              <div class="icon-circle">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg>
              </div>
              <div>
                <div style="font-size:13.5px;font-weight:500;" id="storageSize">—</div>
                <div style="font-size:11.5px;color:var(--ink-faint);">Repository size</div>
              </div>
            </div>
            <p class="eyebrow" style="margin: 24px 0 8px;">Latest commits</p>
            <div class="panel divide" id="commitList">
              <div class="center-loading"><span class="spinner"></span> Loading...</div>
            </div>
          </section>
        </div>
      </div>
    `;

    (async () => {
      try {
        const items = await Articles.list(account.token, target.owner, target.repo, target.branch);
        const drafts = items.filter(a => a.frontmatter.status === 'draft');
        const scheduled = items.filter(a => a.frontmatter.status === 'scheduled');
        const published = items.filter(a => a.frontmatter.status === 'published');
        const categories = new Set(items.flatMap(a => a.frontmatter.categories || []));
        const tags = new Set(items.flatMap(a => a.frontmatter.tags || []));
        const stats = [items.length, published.length, drafts.length, scheduled.length, categories.size, tags.size];
        document.querySelectorAll('[data-stat]').forEach((el, i) => el.textContent = stats[i]);

        const recentList = document.getElementById('recentList');
        const recent = items.slice(0, 6);
        if (recent.length === 0) {
          recentList.innerHTML = `<div class="empty-row">No articles yet. <a href="editor.html" style="color:var(--brass-600);font-weight:500;">Write your first one</a>.</div>`;
        } else {
          recentList.innerHTML = recent.map(a => `
            <a class="list-row" href="editor.html?path=${encodeURIComponent(a.path)}">
              <div class="title-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4V4Zm3 4h10M7 12h10M7 16h6"/></svg>
                <span>
                  <div class="ttl">${escapeHtml(a.frontmatter.title)}</div>
                  <div class="sub">${timeAgo(a.frontmatter.updatedAt)}</div>
                </span>
              </div>
              <span class="badge badge-${a.frontmatter.status}">${a.frontmatter.status}</span>
            </a>
          `).join('');
        }
      } catch (err) {
        document.getElementById('recentList').innerHTML = `<div class="empty-row">${escapeHtml(err.message || 'Could not load articles.')}</div>`;
      }

      try {
        const repoInfo = await window.GitHubAPI.getRepoInfo(account.token, target.owner, target.repo);
        document.getElementById('storageSize').textContent = (repoInfo.size / 1024).toFixed(1) + ' MB';
        const link = document.getElementById('repoLink');
        link.href = repoInfo.html_url;
        link.style.display = 'inline';
        document.getElementById('repoLinkText').textContent = `${target.owner}/${target.repo}`;
      } catch { /* non-critical */ }

      try {
        const commits = await window.GitHubAPI.getCommits(account.token, target.owner, target.repo, target.branch, null, 8);
        const commitList = document.getElementById('commitList');
        if (commits.length === 0) {
          commitList.innerHTML = `<div class="empty-row">No commit history yet.</div>`;
        } else {
          commitList.innerHTML = commits.map(c => `
            <a class="list-row" href="${c.url}" target="_blank" rel="noreferrer">
              <div class="title-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v6M12 15v6"/></svg>
                <span>
                  <div class="ttl">${escapeHtml(c.message.split('\n')[0])}</div>
                  <div class="sub mono">${c.sha.slice(0,7)} · ${escapeHtml(c.authorName)} · ${timeAgo(c.date)}</div>
                </span>
              </div>
            </a>
          `).join('');
        }
      } catch {
        document.getElementById('commitList').innerHTML = `<div class="empty-row">Could not load commit history.</div>`;
      }
    })();
  }
</script>
</body>
</html>
