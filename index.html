<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Raga Journal</title>

<link rel="stylesheet" href="assets/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<header class="site-header">
    <div class="container">

        <a class="logo" href="/">
            <img id="logo" alt="">
        </a>

        <nav id="menu"></nav>

    </div>
</header>

<main>

<section id="hero" class="hero"></section>

<section id="announcement"></section>

<section class="wrapper">

<div class="section">

<h2>Featured Story</h2>

<div id="featured"></div>

</div>

<div class="section">

<h2>Editor's Picks</h2>

<div id="editors" class="grid"></div>

</div>

<div class="section">

<h2>Trending</h2>

<div id="trending" class="grid"></div>

</div>

<div class="section">

<h2>Latest Articles</h2>

<div id="latest" class="grid"></div>

</div>

<div class="section">

<h2>Categories</h2>

<div id="categories" class="chips"></div>

</div>

<div class="section">

<h2>Gallery</h2>

<div id="gallery" class="gallery"></div>

</div>

<div class="section">

<h2>Videos</h2>

<div id="videos" class="grid"></div>

</div>

<section id="newsletter"></section>

</section>

</main>

<footer id="footer"></footer>

<script>

let HOME={};
let POSTS=[];

async function loadHome(){

const text=await fetch("/content/homepage.yml").then(r=>r.text());

HOME=jsyaml.load(text);

document.title=HOME.site.title;

document.getElementById("logo").src=HOME.site.logo;

renderHero();

renderCategories();

renderFooter();

renderNewsletter();

}

async function loadPosts(){

const response=await fetch("/content/articles/index.json");

POSTS=await response.json();

renderFeatured();

renderLatest();

renderTrending();

renderEditors();

renderGallery();

renderVideos();

}

function card(post){

return `
<a class="card" href="${post.url}">

<img src="${post.cover}" loading="lazy">

<div class="content">

<div class="category">${post.category}</div>

<h3>${post.title}</h3>

<p>${post.description}</p>

</div>

</a>
`;

}

function renderHero(){

if(!HOME.hero.enabled)return;

document.getElementById("hero").innerHTML=`

<div class="hero-image">

<img src="${HOME.hero.image}">

</div>

<div class="hero-content">

<h1>${HOME.hero.title}</h1>

<p>${HOME.hero.subtitle}</p>

<a class="button" href="${HOME.hero.button_link}">
${HOME.hero.button_text}
</a>

</div>

`;

}

function renderFeatured(){

const post=POSTS.find(x=>x.slug===HOME.featured.article);

if(!post)return;

document.getElementById("featured").innerHTML=card(post);

}

function renderLatest(){

document.getElementById("latest").innerHTML=

POSTS

.slice(0,HOME.latest.limit)

.map(card)

.join("");

}

function renderTrending(){

document.getElementById("trending").innerHTML=

POSTS

.filter(p=>p.trending)

.slice(0,HOME.trending.limit)

.map(card)

.join("");

}

function renderEditors(){

document.getElementById("editors").innerHTML=

POSTS

.filter(p=>p.editor)

.slice(0,HOME.editors_pick.limit)

.map(card)

.join("");

}

function renderCategories(){

document.getElementById("categories").innerHTML=

HOME.categories.items

.map(c=>`<a href="/category/${c}">${c}</a>`)

.join("");

}

function renderGallery(){

document.getElementById("gallery").innerHTML=

POSTS

.filter(p=>p.cover)

.slice(0,HOME.gallery.limit)

.map(p=>`<img src="${p.cover}">`)

.join("");

}

function renderVideos(){

document.getElementById("videos").innerHTML=

POSTS

.filter(p=>p.video)

.slice(0,HOME.videos.limit)

.map(card)

.join("");

}

function renderNewsletter(){

if(!HOME.newsletter.enabled)return;

document.getElementById("newsletter").innerHTML=`

<h2>${HOME.newsletter.title}</h2>

<p>${HOME.newsletter.text}</p>

<form>

<input placeholder="Email">

<button>Subscribe</button>

</form>

`;

}

function renderFooter(){

document.getElementById("footer").innerHTML=`

<p>${HOME.footer.copyright}</p>

`;

}

Promise.all([

loadHome(),

loadPosts()

]);

</script>

</body>
</html>
